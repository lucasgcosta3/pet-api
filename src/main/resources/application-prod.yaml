spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  docker:
    compose:
      enabled: false

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
